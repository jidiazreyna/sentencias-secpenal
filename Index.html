<!doctype html>
<html>
  <head>
    <base target="_top">
    <style>
      :root{
        --bg:#edf2f8;
        --bg-2:#e3ebf5;
        --surface:#ffffff;
        --surface-soft:#f7faff;
        --text:#0f2747;
        --muted:#4f6582;
        --border:#d2deec;
        --primary:#0f3f73;
        --primary-dark:#0a2f56;
        --primary-soft:#dfeafb;
        --danger:#b42318;
        --shadow-lg: 0 30px 70px rgba(14, 43, 79, .18);
        --shadow-md: 0 10px 26px rgba(16, 63, 117, .14);
        --radius-xl: 24px;
        --radius-lg: 16px;
      }

      *{ box-sizing:border-box; }

      body{
        margin:0;
        min-height:100vh;
        font-family: "Segoe UI", system-ui, -apple-system, Roboto, Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(1200px 600px at 15% -200px, #ffffff 0%, transparent 70%),
          radial-gradient(1000px 420px at 95% 0px, #d7e6fb 0%, transparent 72%),
          linear-gradient(160deg, var(--bg) 0%, var(--bg-2) 100%);
      }

      .wrap{
        max-width: 1180px;
        margin: 44px auto;
        padding: 0 24px;
      }

      .card{
        position: relative;
        overflow: hidden;
        background: linear-gradient(180deg, #ffffff 0%, #fafdff 100%);
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow-lg);
        padding: 28px;
      }

      .card::before,
      .card::after{
        content:"";
        position:absolute;
        pointer-events:none;
      }

      .card::before{
        width: 460px;
        height: 460px;
        right:-180px;
        top:-230px;
        border-radius:50%;
        background: radial-gradient(circle at center, rgba(15, 63, 115, .18), transparent 70%);
      }

      .card::after{
        inset:0;
        background: linear-gradient(130deg, rgba(15,63,115,.08), transparent 34%);
      }

      .layout{
        position:relative;
        z-index:2;
        display:grid;
        grid-template-columns: 2fr 1fr;
        gap: 20px;
      }

      @media (max-width: 980px){
        .layout{ grid-template-columns: 1fr; }
      }

      .panel{
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-md);
      }

      .mainPanel{ padding: 24px; }

      .header{
        display:flex;
        align-items:flex-start;
        justify-content:space-between;
        gap:12px;
        margin-bottom: 20px;
        padding-bottom: 18px;
        border-bottom: 1px solid #d9e4f2;
      }

      h1{
        margin:0;
        font-size: 32px;
        line-height:1.1;
        letter-spacing: .2px;
        color:#0e3058;
      }

      .subtitle{
        margin-top:8px;
        font-size: 14px;
        color: var(--muted);
        max-width: 70ch;
      }

      .badge{
        background: var(--primary-soft);
        border: 1px solid #bad0ee;
        color: #123f73;
        font-size: 12px;
        font-weight: 700;
        border-radius: 999px;
        padding: 8px 12px;
        white-space: nowrap;
      }

      .grid{
        display:grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      @media (max-width: 820px){
        .grid{ grid-template-columns: 1fr; }
      }

      .field{
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
        background: linear-gradient(180deg, #ffffff 0%, #f9fcff 100%);
      }

      .field.full{ grid-column:1/-1; }

      .label{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:10px;
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 8px;
        font-weight: 700;
      }

      .meta{ font-size:12px; color: var(--muted); font-weight:600; }

      .rowStack{ display:grid; gap:10px; }

      select, button{
        width:100%;
        padding: 11px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background:#fff;
        font-size: 14px;
        outline: none;
      }

      select{ color:#17365f; }

      select:focus, button:focus-visible{
        border-color: #6290c6;
        box-shadow: 0 0 0 3px rgba(56, 114, 182, .18);
      }

      .btn{
        border:none;
        background: linear-gradient(180deg, #1a4f88 0%, var(--primary) 100%);
        color:#fff;
        font-weight:700;
        letter-spacing:.2px;
        cursor:pointer;
        transition:.18s ease;
        padding: 12px;
      }

      .btn:hover{ background: linear-gradient(180deg, #15467a 0%, var(--primary-dark) 100%); transform: translateY(-1px); }
      .btn:disabled{ opacity:.55; cursor:not-allowed; transform:none; }

      .btnSecondary{
        background: var(--surface-soft);
        border: 1px solid var(--border);
        color:#17365f;
        font-weight:600;
        cursor:pointer;
      }

      .btnSecondary:hover{ border-color:#b8c9db; background:#edf5ff; }

      .actions{ display:flex; gap:10px; margin-top: 18px; }
      @media (max-width: 520px){ .actions{ flex-direction:column; } }

      .hint{ font-size:12px; color: var(--muted); margin-top: 10px; }

      .preview{ display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
      .chip{
        background:#edf3fb;
        border:1px solid #bfd0e5;
        color:#123f73;
        font-size:12px;
        padding:6px 10px;
        border-radius:999px;
        font-weight:700;
      }

      .warn{ color: var(--danger); font-weight:700; font-size: 12px; margin-top: 10px; }

      #out{
        margin-top:16px;
        padding-top:14px;
        border-top:1px dashed #b8c9db;
        font-size:14px;
      }

      a{ color: var(--primary); font-weight:700; text-decoration:none; }
      a:hover{ text-decoration:underline; }

      .sidePanel{
        padding: 18px;
        display:grid;
        align-content:start;
        gap: 12px;
        background: linear-gradient(180deg, #f9fcff 0%, #eef5ff 100%);
      }

      .sideBlock{
        background:#fff;
        border:1px solid var(--border);
        border-radius:12px;
        padding:12px;
        color: var(--muted);
        font-size:13px;
      }

      .sideAccent{
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(90deg, #275f9e 0%, #6f9fd5 100%);
        margin-bottom: 10px;
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <div class="card">
        <div class="layout">
          <div class="panel mainPanel">
            <div class="header">
              <div>
                <h1>Corrector de Sentencias</h1>
                <div class="subtitle">Seleccioná un DOCX de Entrada, definí presidencia y el orden de votos.</div>
              </div>
              <div class="badge" aria-hidden="true"></div>
            </div>

            <div class="grid">
              <div class="field">
                <div class="label">
                  <span>Archivo de Entrada</span>
                  <span class="meta">Drive</span>
                </div>
                <div class="rowStack">
                  <button class="btnSecondary" onclick="loadFiles()">Cargar archivos</button>
                  <select id="fileSelect"></select>
                </div>
                <div class="hint">Se muestran solo DOCX (no Google Docs, no PDFs).</div>
              </div>

              <div class="field">
                <div class="label">
                  <span>Presidencia</span>
                  <span class="meta">Debe estar entre los 3 que votan</span>
                </div>
                <select id="presidente"></select>
                <div class="hint">Elegí el Vocal que preside la Sala.</div>
              </div>

              <div class="field full">
                <div class="label">
                  <span>Vocales y orden de votos</span>
                  <span class="meta">3 distintos, en orden</span>
                </div>

                <div class="grid">
                  <select id="o1"></select>
                  <select id="o2"></select>
                  <select id="o3"></select>
                </div>

                <div class="preview" id="preview"></div>
                <div class="warn" id="warn" style="display:none"></div>
              </div>
            </div>

            <div class="actions">
              <button class="btn" id="runBtn" onclick="run()">Corregir</button>
            </div>

            <div id="out"></div>
          </div>

          <aside class="panel sidePanel" aria-hidden="true">
            <div class="sideBlock">
              <div class="sideAccent"></div>
            </div>
            <div class="sideBlock">
              <div class="sideAccent"></div>
            </div>
            <div class="sideBlock">
              <div class="sideAccent"></div>
            </div>
          </aside>
        </div>
      </div>
    </div>

    <script>
      const VOCALES = [
        "Aída Tarditti",
        "Domingo Sesín",
        "Luis Enrique Rubio",
        "María Marta Cáceres de Bollati",
        "Sebastián Cruz López Peña",
        "Jessica Valentini"
      ];

      function fillSelect(sel, values) {
        sel.innerHTML = "";
        values.forEach(v => {
          const opt = document.createElement("option");
          opt.value = v;
          opt.textContent = v;
          sel.appendChild(opt);
        });
      }

      function updatePreviewAndValidate() {
        const o1 = document.getElementById("o1").value;
        const o2 = document.getElementById("o2").value;
        const o3 = document.getElementById("o3").value;
        const presidente = document.getElementById("presidente").value;

        const arr = [o1, o2, o3];

        const preview = document.getElementById("preview");
        preview.innerHTML = "";
        arr.forEach((name, idx) => {
          const chip = document.createElement("div");
          chip.className = "chip";
          chip.textContent = `${idx + 1}. ${name}`;
          preview.appendChild(chip);
        });

        const warn = document.getElementById("warn");
        const uniq = new Set(arr);
        let msg = "";

        if (uniq.size !== 3) msg = "Los 3 vocales deben ser distintos.";
        else if (!uniq.has(presidente)) msg = "La presidencia debe estar entre los 3 vocales seleccionados.";

        if (msg) {
          warn.style.display = "block";
          warn.textContent = "⚠️ " + msg;
          document.getElementById("runBtn").disabled = true;
        } else {
          warn.style.display = "none";
          warn.textContent = "";
          document.getElementById("runBtn").disabled = false;
        }
      }

      function init() {
        ["presidente","o1","o2","o3"].forEach(id => {
          fillSelect(document.getElementById(id), VOCALES);
        });

        // Defaults
        document.getElementById("presidente").value = "Sebastián Cruz López Peña";
        document.getElementById("o1").value = "Sebastián Cruz López Peña";
        document.getElementById("o2").value = "Aída Tarditti";
        document.getElementById("o3").value = "María Marta Cáceres de Bollati";

        ["presidente","o1","o2","o3"].forEach(id => {
          document.getElementById(id).addEventListener("change", updatePreviewAndValidate);
        });

        updatePreviewAndValidate();
        loadFiles();
      }

      function loadFiles() {
        google.script.run.withSuccessHandler(files => {
          const sel = document.getElementById("fileSelect");
          sel.innerHTML = "";

          if (!files || files.length === 0) {
            const opt = document.createElement("option");
            opt.value = "";
            opt.textContent = "(No hay DOCX en Entrada)";
            sel.appendChild(opt);
            return;
          }

          files.forEach(f => {
            const opt = document.createElement("option");
            opt.value = f.id;
            opt.textContent = f.name;
            sel.appendChild(opt);
          });
        }).withFailureHandler(err => {
          document.getElementById("out").innerHTML = `<p style="color:${getComputedStyle(document.documentElement).getPropertyValue('--danger')}">${err.message}</p>`;
        }).listInputFiles();
      }

      function run() {
        const fileId = document.getElementById("fileSelect").value;
        if (!fileId) {
          document.getElementById("out").innerHTML = `<p style="color:${getComputedStyle(document.documentElement).getPropertyValue('--danger')}">No hay archivo DOCX seleccionado.</p>`;
          return;
        }

        const settings = {
          presidente: document.getElementById("presidente").value,
          ordenVotos: [
            document.getElementById("o1").value,
            document.getElementById("o2").value,
            document.getElementById("o3").value
          ]
        };

        document.getElementById("out").innerHTML = "Procesando…";

        google.script.run
        .withSuccessHandler(res => {
          const compareLink = res.comparisonDocUrl
            ? `<p><a href="${res.comparisonDocUrl}" target="_blank">Reporte de errores (Google Docs)</a></p>`
            : "";

          document.getElementById("out").innerHTML = `
            <p><b>Listo</b></p>
            <p><a href="${res.correctedDocxUrl}" target="_blank">WORD corregido (DOCX)</a></p>
            ${compareLink}
          `;
        })

          .withFailureHandler(err => {
            document.getElementById("out").innerHTML = `<p style="color:red">${err.message}</p>`;
          })
          .correctDocx(fileId, settings);

      }

      init();
    </script>
  </body>
</html>
